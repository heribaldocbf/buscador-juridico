# Hub Jurídico — configuração visual (local + Streamlit Cloud)

[theme]
base = "dark"
font = "sans serif"

[theme.dark]
primaryColor = "#D4AF37"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#1C2128"
textColor = "#E6EDF3"

[theme.light]
primaryColor = "#B8860B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#31333F"

[client]
toolbarMode = "auto"

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
